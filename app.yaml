command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # Foundation Model endpoint for AI features
  - name: SERVING_ENDPOINT
    value: databricks-claude-sonnet-4-5

  # External API keys
  - name: FRED_API_KEY
    value: c762eaa3194c7a53517a0a0e319b6a25
  - name: FINNHUB_API_KEY
    value: d6is6npr01qleu95bkegd6is6npr01qleu95bkf0
  - name: NASA_FIRMS_API_KEY
    value: f36a6199bb704b87ed2313e3dcd4f31f

  # UCDP API access token (Uppsala Conflict Data Program)
  - name: UCDP_ACCESS_TOKEN
    value: e41d013c8650e84e

  # ACLED OAuth credentials (register at https://acleddata.com/data-export-tool/)
  # TODO: Register for API access and add credentials
  - name: ACLED_EMAIL
    value: ""
  - name: ACLED_PASSWORD
    value: ""

  # Lakebase Autoscaling database connection
  # Note: Autoscaling not yet supported in Apps UI, so hardcoding connection details
  # Project: worldmonitor-cache, Branch: production
  - name: PGHOST
    value: ep-winter-dawn-d2ev1vuh.database.us-east-1.cloud.databricks.com
  - name: PGPORT
    value: "5432"
  - name: PGDATABASE
    value: databricks_postgres
  # PGUSER is dynamically determined from the authenticated identity (service principal or user)

  # SQL Warehouse ID for Unity Catalog queries
  - name: DATABRICKS_WAREHOUSE_ID
    value: b868e84cedeb4262

  # Unity Catalog configuration for vessel history
  - name: UC_CATALOG
    value: serverless_stable_3n0ihb_catalog
  - name: UC_SCHEMA
    value: worldmonitor_dev

  # Hybrid storage: Lakebase retention threshold (hours)
  # Data older than this is served from Unity Catalog
  # Data newer than this is served from Lakebase (faster)
  - name: LAKEBASE_RETENTION_HOURS
    value: "24"

resources:
  # Note: Lakebase Autoscaling resources not yet supported in Apps UI
  # Using hardcoded PGHOST above for worldmonitor-cache autoscaling project
  - name: sql_warehouse
    sql_warehouse:
      name: "Serverless Starter Warehouse"
      permission: CAN_USE
